name: release.publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The SDK version to release (e.g., 12.11.0)'
        required: true
        type: string

jobs:
  draft_release:
    name: Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create/edit releases
    outputs:
      release_url: ${{ steps.create_draft.outputs.release_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensure we have all tags for verification

      - name: Create draft
        id: create_draft
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          CP_TAG: CocoaPods-${{ inputs.version }}
          ZIP_PATH: "./artifact.txt" # Mock path; in a real flow, this would come from a previous build artifact
          ASSET_LABEL: "Firebase.zip"
        run: |
          set -e
          
          # --- Step 0: Pre-flight Tag Check --- 
          if ! git rev-parse "$CP_TAG" >/dev/null 2>&1; then
            echo "Error: Tag $CP_TAG not found. Ensure the tag is pushed before releasing."
            exit 1
          fi

          # --- Step 1: Resolve the Tag to a SHA ---
          # This ensures the API gets a direct pointer it can't misunderstand
          TARGET_SHA=$(git rev-parse "$CP_TAG")
          echo "Target SHA for release: $TARGET_SHA"

          # --- Step 2: Generate Release Notes Header --- 
          cat <<EOF > header.md
          The Firebase Apple SDK ($VERSION) is now available. For more details, see 
          the [Firebase Apple SDK release notes.](https://firebase.google.com/support/release-notes/ios#$VERSION)
          
          To install this SDK, see [Add Firebase to your project.](https://firebase.google.com/docs/ios/setup)
          EOF

          # --- Step 3: Create the Immutable Draft ---
          # We use --draft so the team can do a final check before the "Freeze"
          URL=$(gh release create "$VERSION" "$ZIP_PATH#$ASSET_LABEL" \
            --draft \
            --target "$TARGET_SHA" \
            --title "Firebase Apple $VERSION" \
            --notes-file header.md \
            --generate-notes \
            --latest)

          echo "release_url=$URL" >> $GITHUB_OUTPUT

  prepare_approval:
    name: Prepare Approval Info
    needs: draft_release
    runs-on: ubuntu-latest
    
    steps:
      - name: Post Summary
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "### 🚀 Release Ready for Review" >> $GITHUB_STEP_SUMMARY
          echo "Please verify the draft before approving the 'Publish' job below." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "* **Proposed Version:** \`${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "* **Target Tag:** [\`CocoaPods-${{ inputs.version }}\`](https://github.com/${{ github.repository }}/tree/CocoaPods-${{ inputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "* **Target Commit:** [\`${{ needs.draft_release.outputs.target_sha }}\`](https://github.com/${{ github.repository }}/commit/${{ needs.draft_release.outputs.target_sha }})" >> $GITHUB_STEP_SUMMARY
          echo "* **Draft Release URL:** ${{ needs.draft_release.outputs.release_url }}" >> $GITHUB_STEP_SUMMARY

  publish_release:
    name: Publish Release
    needs: prepare_approval
    runs-on: ubuntu-latest
    environment: 'production'

    permissions:
      contents: write # Required to create/edit releases

    steps:
      - name: Create tag and publish release.
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release edit "$VERSION" --draft=false --repo ${{ github.repository }}
          
