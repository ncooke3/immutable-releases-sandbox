name: release.publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The SDK version to release (e.g., 12.11.0)'
        required: true
        type: string

jobs:
  prepare_release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.prep.outputs.target_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensure we have all tags for verification

      - name: Verify and Prepare
        id: prep
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          CP_TAG: CocoaPods-${{ inputs.version }}
        run: |
          set -e

          # --- Step 1: Pre-flight Tag Check --- 
          if ! git rev-parse "$CP_TAG" >/dev/null 2>&1; then
            echo "Error: Tag $CP_TAG not found. Ensure the tag is pushed before releasing."
            exit 1
          fi

          # --- Step 2: Check for existing release ---
          # We use the default token here just to READ the repository state
          RELEASE_INFO=$(gh release view "$VERSION" --json isDraft,url 2>/dev/null || true)
          if [ -n "$RELEASE_INFO" ]; then
            IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.isDraft')
            EXISTING_URL=$(echo "$RELEASE_INFO" | jq -r '.url')

            if [ "$IS_DRAFT" = "false" ]; then
              echo "Error: Version '$VERSION' is already published."
              echo "Releases cannot be overwritten. Please enter an unreleased version number."
              echo "View the existing release here: $EXISTING_URL"
              exit 1
            else
              # Because we don't use the PAT in this job, we safely fail and ask the user to clean it up manually
              echo "Error: Found an existing draft for '$VERSION'."
              echo "Since this workflow publishes directly, please manually delete the draft here: $EXISTING_URL"
              exit 1
            fi
          fi

          # --- Step 3: Resolve the Tag to a SHA ---
          TARGET_SHA=$(git rev-parse "$CP_TAG")
          echo "Target SHA for release: $TARGET_SHA"
          echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT

      - name: Post Summary
        env:
          VERSION: ${{ inputs.version }}
          TARGET_SHA: ${{ steps.prep.outputs.target_sha }}
        run: |
          echo "### 🚀 Release Ready for Review" >> $GITHUB_STEP_SUMMARY
          echo "Please review the details below before approving the 'Publish' job." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "* **Proposed Version:** \`${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "* **Target Tag:** [\`CocoaPods-${{ inputs.version }}\`](https://github.com/${{ github.repository }}/tree/CocoaPods-${{ inputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "* **Target Commit:** [\`${TARGET_SHA}\`](https://github.com/${{ github.repository }}/commit/${TARGET_SHA})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Release Notes Header Preview" >> $GITHUB_STEP_SUMMARY
          echo "> The Firebase Apple SDK ($VERSION) is now available. For more details, see the [Firebase Apple SDK release notes.](https://firebase.google.com/support/release-notes/ios#$VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "> " >> $GITHUB_STEP_SUMMARY
          echo "> To install this SDK, see [Add Firebase to your project.](https://firebase.google.com/docs/ios/setup)" >> $GITHUB_STEP_SUMMARY
          echo "*(**Note:** GitHub will automatically append the changelog, merged pull requests, and contributor list below this header when the release is published.)*" >> $GITHUB_STEP_SUMMARY

  publish_release:
    name: Publish Release
    needs: prepare_release
    runs-on: ubuntu-latest
    environment: 'production'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required so the CLI can resolve the target SHA

      - name: Create and Publish Release
        env:
          GH_TOKEN: ${{ secrets.ENV_SECRET }} 
          VERSION: ${{ inputs.version }}
          TARGET_SHA: ${{ needs.prepare_release.outputs.target_sha }}
          ZIP_PATH: "./artifact.txt" # Mock path
          ASSET_LABEL: "Firebase.zip"
        run: |
          set -e

          # --- Generate Release Notes Header --- 
          cat <<EOF > header.md
          The Firebase Apple SDK ($VERSION) is now available. For more details, see 
          the [Firebase Apple SDK release notes.](https://firebase.google.com/support/release-notes/ios#$VERSION)

          To install this SDK, see [Add Firebase to your project.](https://firebase.google.com/docs/ios/setup)
          EOF

          # --- Create & Publish Immutable Release ---
          # We dropped the --draft flag, so this publishes immediately.
          # The PAT bypasses the 403 error for --generate-notes on historical commits.
          gh release create "$VERSION" "$ZIP_PATH#$ASSET_LABEL" \
            --target "$TARGET_SHA" \
            --title "Firebase Apple $VERSION" \
            --notes-file header.md \
            --generate-notes \
            --latest