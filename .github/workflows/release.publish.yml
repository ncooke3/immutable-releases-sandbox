name: release.publish

# +----------------------------------------------------------------------------+
# | WARNING: DO NOT MODIFY THIS TRIGGER BLOCK
# | This workflow should only be triggered manually via workflow_dispatch
# | from the 'main' branch.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The SDK version to release (e.g., 12.11.0)'
        required: true
        type: string
# +----------------------------------------------------------------------------+

# Enforce least privilege for the default GITHUB_TOKEN.
# Write permissions are handled exclusively by the PAT in the publish step.
permissions:
  contents: read

jobs:
  prepare_release:
    name: Prepare Release
    runs-on: ubuntu-latest
    
    outputs:
      target_sha: ${{ steps.prep.outputs.target_sha }}
      sdk_name: ${{ steps.prep.outputs.sdk_name }}
      asset_path: ${{ steps.prep.outputs.asset_path }}
      asset_label: ${{ steps.prep.outputs.asset_label }}
      notes_header: ${{ steps.prep.outputs.notes_header }}

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0 # Required to resolve the target SHA for historical tags
          persist-credentials: false

      - name: Verify and Prepare
        id: prep
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          CP_TAG: CocoaPods-${{ inputs.version }}
          
          # Single source of truth for workflow variables
          SDK_NAME: "Firebase Apple"
          ASSET_PATH: "./artifact.txt" # Mock path
          ASSET_LABEL: "Firebase.zip"
          NOTES_URL: "https://firebase.google.com/support/release-notes/ios"
          SETUP_URL: "https://firebase.google.com/docs/ios/setup"
        run: |
          set -e

          if ! git rev-parse "$CP_TAG" >/dev/null 2>&1; then
            echo "Error: Tag '$CP_TAG' not found. Ensure the tag is pushed before releasing."
            exit 1
          fi

          RELEASE_INFO=$(gh release view "$VERSION" --json isDraft,url 2>/dev/null || true)
          if [ -n "$RELEASE_INFO" ]; then
            IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.isDraft')
            EXISTING_URL=$(echo "$RELEASE_INFO" | jq -r '.url')

            if [ "$IS_DRAFT" = "false" ]; then
              echo "Error: Version '$VERSION' is already published at $EXISTING_URL"
              exit 1
            else
              echo "Error: Found an existing draft for '$VERSION' at $EXISTING_URL"
              echo "Please manually delete the draft before proceeding."
              exit 1
            fi
          fi

          TARGET_SHA=$(git rev-parse "$CP_TAG")
          
          echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT
          echo "sdk_name=$SDK_NAME" >> $GITHUB_OUTPUT
          echo "asset_path=$ASSET_PATH" >> $GITHUB_OUTPUT
          echo "asset_label=$ASSET_LABEL" >> $GITHUB_OUTPUT

          # Export the release notes block as a multi-line string output
          {
            echo 'notes_header<<EOF'
            echo "The $SDK_NAME SDK ($VERSION) is now available. For more details, see the [$SDK_NAME SDK release notes.]($NOTES_URL#$VERSION)"
            echo ""
            echo "To install this SDK, see [Add Firebase to your project.]($SETUP_URL)"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Post Summary
        env:
          VERSION: ${{ inputs.version }}
          CP_TAG: CocoaPods-${{ inputs.version }}
          TARGET_SHA: ${{ steps.prep.outputs.target_sha }}
          SDK_NAME: ${{ steps.prep.outputs.sdk_name }}
          ASSET_PATH: ${{ steps.prep.outputs.asset_path }}
          ASSET_LABEL: ${{ steps.prep.outputs.asset_label }}
          NOTES_HEADER: ${{ steps.prep.outputs.notes_header }}
        run: |
          echo "### 🚀 Release Ready for Review" >> $GITHUB_STEP_SUMMARY
          echo "Please review the details below before approving the publish job." >> $GITHUB_STEP_SUMMARY

          echo "> [!NOTE]" >> $GITHUB_STEP_SUMMARY
          echo "> You will not be able to edit the tag or assets after publishing because immutable releases are enabled." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**Tag:** \`$VERSION\` &emsp;&emsp; **Target:** [\`$CP_TAG\`](https://github.com/${{ github.repository }}/tree/$CP_TAG) / [\`${TARGET_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/$TARGET_SHA)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Release title" >> $GITHUB_STEP_SUMMARY
          echo "\`$SDK_NAME $VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Release notes" >> $GITHUB_STEP_SUMMARY
          echo "$NOTES_HEADER" | sed 's/^/> /' >> $GITHUB_STEP_SUMMARY
          echo "> " >> $GITHUB_STEP_SUMMARY
          echo "> *< GitHub will automatically append the changelog, merged pull requests, and contributor list here >*" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "* 📦 \`$ASSET_LABEL\` *(Source: \`$ASSET_PATH\`)*" >> $GITHUB_STEP_SUMMARY

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Once published, view release at:** [https://github.com/${{ github.repository }}/releases/tag/$VERSION](https://github.com/${{ github.repository }}/releases/tag/$VERSION)" >> $GITHUB_STEP_SUMMARY

  publish_release:
    name: Publish Release
    needs: prepare_release
    runs-on: ubuntu-latest

    # +------------------------------------------------------------------------+
    # | WARNING: DO NOT MODIFY THE ENVIRONMENT BLOCK
    # | The 'production' environment acts as the core security boundary. It
    # | enforces branch protections (main only) and gates access to the PAT.
    environment: 'production'
    # +------------------------------------------------------------------------+

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0 # Required so the CLI can resolve the target SHA
          persist-credentials: false

      - name: Create and Publish Release
        env:
          GH_TOKEN: ${{ secrets.ENV_SECRET }} 
          VERSION: ${{ inputs.version }}
          TARGET_SHA: ${{ needs.prepare_release.outputs.target_sha }}
          SDK_NAME: ${{ needs.prepare_release.outputs.sdk_name }}
          ASSET_PATH: ${{ needs.prepare_release.outputs.asset_path }}
          ASSET_LABEL: ${{ needs.prepare_release.outputs.asset_label }}
          NOTES_HEADER: ${{ needs.prepare_release.outputs.notes_header }}
        run: |
          set -e

          RELEASE_TITLE="$SDK_NAME $VERSION"
          ASSET_ARG="$ASSET_PATH#$ASSET_LABEL"
          NOTES_FILE="header.md"

          echo "$NOTES_HEADER" > "$NOTES_FILE"

          gh release create "$VERSION" "$ASSET_ARG" \
            --target "$TARGET_SHA" \
            --title "$RELEASE_TITLE" \
            --notes-file "$NOTES_FILE" \
            --generate-notes \
            --latest